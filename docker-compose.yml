services:
  kabu-trader-jp:
    build: .
    container_name: kabu-trader-jp
    restart: unless-stopped
    network_mode: host
    command: ["-c", "/app/config/default.json", "monitor", "--paper"]
    volumes:
      - ./config:/app/config
      - ./paper_trading:/app/paper_trading
      - ./models:/app/models
    environment:
      - TZ=Asia/Tokyo
      # Secrets come from .env (git-ignored). Copy .env.example to .env and fill in.
      # For env vars to take effect, the matching fields in config/default.json
      # must be empty ("") — otherwise the config value wins.
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LINE_CHANNEL_ACCESS_TOKEN=${LINE_CHANNEL_ACCESS_TOKEN:-}
      - LINE_USER_ID=${LINE_USER_ID:-}
      - EMAIL_SENDER=${EMAIL_SENDER:-}
      - EMAIL_RECIPIENT=${EMAIL_RECIPIENT:-}
      - EMAIL_APP_PASSWORD=${EMAIL_APP_PASSWORD:-}

  kabu-trader-jp-live:
    build: .
    container_name: kabu-trader-jp-live
    restart: unless-stopped
    network_mode: host
    command: ["-c", "/app/config/live.json", "monitor", "--paper"]
    # OAuth Web API broker (config/live.json broker.type=webapi): IBIND_* creds
    # live in oauth.env (600-perm, git-ignored, NOT in the image), and the RSA
    # keys are read from their absolute paths — so mount the dir read-only at the
    # same path the env vars reference. Set IBKR_OAUTH_DIR to relocate.
    env_file:
      - ${IBKR_OAUTH_DIR:-/home/ec2-user/ibkr-oauth}/oauth.env
    volumes:
      - ./config:/app/config
      - ./paper_trading_live:/app/paper_trading_live
      - ./models:/app/models
      - ${IBKR_OAUTH_DIR:-/home/ec2-user/ibkr-oauth}:${IBKR_OAUTH_DIR:-/home/ec2-user/ibkr-oauth}:ro
    environment:
      - TZ=Asia/Tokyo
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LINE_CHANNEL_ACCESS_TOKEN=${LINE_CHANNEL_ACCESS_TOKEN:-}
      - LINE_USER_ID=${LINE_USER_ID:-}
      - EMAIL_SENDER=${EMAIL_SENDER:-}
      - EMAIL_RECIPIENT=${EMAIL_RECIPIENT:-}
      - EMAIL_APP_PASSWORD=${EMAIL_APP_PASSWORD:-}

  kabu-trader-us:
    build: .
    container_name: kabu-trader-us
    restart: unless-stopped
    command: ["-c", "/app/config/us.json", "monitor", "--paper"]
    volumes:
      - ./config:/app/config
      - ./paper_trading_us:/app/paper_trading_us
      - ./models:/app/models
    environment:
      - TZ=America/New_York
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LINE_CHANNEL_ACCESS_TOKEN=${LINE_CHANNEL_ACCESS_TOKEN:-}
      - LINE_USER_ID=${LINE_USER_ID:-}
      - EMAIL_SENDER=${EMAIL_SENDER:-}
      - EMAIL_RECIPIENT=${EMAIL_RECIPIENT:-}
      - EMAIL_APP_PASSWORD=${EMAIL_APP_PASSWORD:-}
